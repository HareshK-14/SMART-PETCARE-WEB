spring.application.name=backend
server.port=8081

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/petcare
spring.datasource.username=postgres
spring.datasource.password=Haresh@2006
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings (update schema automatically, drop during testing context# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Fix: Disable server-side prepared statements for Supabase PgBouncer compatibility
# Without this, PgBouncer (transaction mode) throws: ERROR: prepared statement "S_X" already exists
# prepareThreshold=0 tells the JDBC driver to NEVER use server-side prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

# JWT Security
# Ensure this secret is at least 64 characters long (512 bits) for HS512
petcare.app.jwtSecret=SuperSecretKeyForSmartPetCarePlatformWhichNeedsToBeExtremelyLongAndSecureToPreventBruteForceAttacksXYZ123!
petcare.app.jwtExpirationMs=86400000
# JWT Security
