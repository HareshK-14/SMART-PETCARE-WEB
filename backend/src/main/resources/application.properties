spring.application.name=backend
server.port=8081

# PostgreSQL Configuration (local dev fallback – overridden by DATABASE_URL env var on Render)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/petcare?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Haresh@2006}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP – Supabase/PgBouncer compatibility
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true

# JWT Security
# Ensure this secret is at least 64 characters long (512 bits) for HS512
petcare.app.jwtSecret=SuperSecretKeyForSmartPetCarePlatformWhichNeedsToBeExtremelyLongAndSecureToPreventBruteForceAttacksXYZ123!
petcare.app.jwtExpirationMs=86400000
# JWT Security
jwt.secret=SuperSecretKeyForSmartPetCarePlatformWhichNeedsToBeExtremelyLongAndSecureToPreventBruteForceAttacksXYZ123!
jwt.expiration=86400000


